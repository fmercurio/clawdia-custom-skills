# Nginx reverse proxy template for CapRover apps
# Copy this as nginx.conf and modify UPSTREAM_* values.
# For static upstreams (TOTVS cloud, etc.), hardcode the values directly.
#
# For envsubst-based dynamic config, use $VARIABLES and pair with
# an entrypoint.sh that runs envsubst before starting nginx.
# See references/playwright-deploy-pattern.md for deploy automation.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_tokens off;

    # Healthcheck for CapRover
    location = /healthz {
        default_type text/plain;
        return 200 "ok";
    }

    # --- OPTION A: Static upstream (recommended for fixed backends) ---
    # Replace HOST, PORT, SCHEME with actual values.
    #
    # location / {
    #     proxy_pass https://upstream.example.com:4010;
    #     proxy_ssl_verify off;
    #     proxy_ssl_server_name on;
    #     proxy_ssl_name upstream.example.com;
    #     proxy_set_header Host upstream.example.com;
    #     ...
    # }

    # --- OPTION B: Dynamic upstream via envsubst ---
    # Requires entrypoint.sh with:
    #   envsubst '$UPSTREAM_HOST $UPSTREAM_PORT $UPSTREAM_SCHEME' \
    #     < /tmp/nginx.conf.template > /etc/nginx/conf.d/default.conf
    # IMPORTANT: variables MUST have $ prefix: $UPSTREAM_HOST, not UPSTREAM_HOST
    #
    # location / {
    #     resolver 8.8.8.8 1.1.1.1 valid=30s;
    #     proxy_pass $UPSTREAM_SCHEME://$UPSTREAM_HOST:$UPSTREAM_PORT;
    #     proxy_ssl_verify off;
    #     proxy_ssl_server_name on;
    #     proxy_ssl_name $UPSTREAM_HOST;
    #     proxy_set_header Host $UPSTREAM_HOST;
    #     ...
    # }

    location / {
        # ↑ Copy one of the proxy_pass blocks above and uncomment

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts for long-running operations (ERP, file uploads)
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Buffer settings for large responses
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}

# ──────────────────────────────────────────────
# Pitfalls to avoid:
#
# 1. nginx:alpine auto-envsubst: /etc/nginx/templates/ is processed
#    automatically. Put custom templates elsewhere (e.g. /tmp/).
#
# 2. TOTVS Broker: if proxying a Protheus webapp, redirect / → /webapp/:
#    location = / { return 302 /webapp/; }
#    The broker sets a cookie on first request and expects it back on /webapp/,
#    NOT on /. Sending the cookie to / causes connection drops (502).
#
# 3. error_page 502 → return 200 '<html>...': browsers download the response
#    as a file instead of rendering. Fix upstream connectivity instead.
#
# 4. Healthcheck Content-Type: use `default_type text/plain`, not
#    `add_header Content-Type` — the latter can cause file download behavior.
# ──────────────────────────────────────────────
